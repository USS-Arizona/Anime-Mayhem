#FURRIES UWU

enc_am.1.t: "The Calamity" 
enc_am.1.d: "It was Thursday evening and things in the Depot were quiet...too quiet for Dornan if he was honest. He had a bad feeling something was about to happen. The more older population of their little Enclave at the Depot was far too well behaved, the younger too busy-bodied today. He just knew some bullshit from the Wasteland was about to happen. \n\nBy the Lord and Savior themselves, he was god damn right! Not even two hours past mid-morning and the Depot shook like crazy as a portal opened up in the middle of Storage Facility T-618, scaring the bajesus outta some poor Privates smoking a joint in their offtime. What walked through horrified most sides, confused a few, and intrigued a very minut some. \n\nOut from the Portal came humans, super humans, and robots. All marching behind a man in an old US Army uniform who looked at Sergeant Dornan and asked one thing to the baffled aging man, \n\n'Is Douglas Granite here yet?"
enc_am.1.a: "What. The. Literal. Fuck."
enc_am.1.b: "'Oh hey what does this trigger do...opps.'"
enc_am_furries_tt: "I mean...they could be useful."
enc_am_no_furries_tt: "WHO TURNED OFF THE SAFETY?"

#American Heroes

enc_am.2.t: "American Heroes!"
enc_am.2.d: "Also among these mass amounts of human and animal people, were even American Heroes from days past! Albeit from multiple universes. \n\nAmong them being Henry Arnold, General Pershing, George Washington, and even American Singers such as Kenny Loggins and Martin O'Donnell! It seems that according to the robots and our past heroes, their worlds were taken over by the Purists leading to them fleeing from their respective universes. Each flocking to ours to assist in Douglas Granite winning the election."
enc_am.2.a: "What. Did. They. Do."
enc_am_american_heroes_tt: "They did what to the Enterprise?!"

#American Grit

enc_am.3.t: "Rugged Men"
enc_am.3.d: "General Pershing was not one to shy away from the bloody side of war, nor was he one to simply back away when the going got tough. \n\nHim and Arnold had been through hell and as he stood over Sergeant Dornan training the recruits with Sherman watching on with curiosity at the training regiment, he frowned. \n\nHis America had changed from how it was. Granted, it was divided in his time even before the Purists showed up. But this...this was awful. \n\nRadiation, whatever that was, scorched the landscape and he knew without a doubt... \n\nHe would not stop until it was restored."
enc_am.3.a: "This United States will be restored."
enc_am_american_grit_tt: "Lord willing."

#An Argument of American Heroes

enc_am.4.t: "Argument of Heroes"
enc_am.4.d: "Arnold and Pershing often butted heads back in the Golden Days before the Purists. Even now, old Ike did. But this? This was too far. \n\n'My tactics worked, Arnold. We kicked the Germans out from Europe and ensured victories for days to come!' \n\nArnold, for his part, glared at Pershing. What his tactics did, could be seen merely out a window. \n\n'Your tactics led to a nuclear holocaust worse than the Jerries or even the Nazis! Listen here, John. I once spoke highly of you, even admired you a bit but ever since we've been stuck together with Washington, you have been nothing but a pain in the ass! I know you don't like me, heck I don't even like you given the circumstances YOU created in this universe so shut up, we're the last of our United States now. Do you really, REALLY want to repeat a Great Apocolypse just for a victory?!'"
enc_am.4.a: "Pershing was silent..."
enc_am_american_heroes_argument_tt: "...but deep down, he knew, Hap was right."

#Remembering Sonic

enc_am.5.t: "Remembering Yamato"
enc_am.5.d: "Kodai sat on top of the Sierra Army Depot Admin Building and held a picture of him and the Yamato crew together. It had been taken prior to the Purist's arrival. \n\nTears trickled down the captian's cheek, he missed his friends so much, more than words could tell. \n\nThey had been there for him since their adventure to Iscandar...and now...\n\nNow he was alone."
enc_am.5.a: "Rest well, Yamato."
enc_remembering_yamato_tt: "You won't be forgotten."

#American Singers

enc_am.6.t: "America's Warrior Spirits"
enc_am.6.d: "In order to boost morale among the troops and civilian populace, the singers from the past have been asked to sing to cheer our servicemember's on through this tremedous time and era. \n\nKenny Loggins, Martin O'Donnell, and other prominant radio legends return to radio to boost our morale on AFN. Each with songs from long ago during the Cold War and even new songs of their own making."
enc_am.6.a: "Never thought, I would see this."
enc_am_american_singers_tt: "Or hear it for that matter."

enc_furry.7.t: "Washington Remnant"
enc_furry.7.d: "When arriving up in Washington, we did not expect to find Enclave remnants from the Purists when exploring the ruined area of White Sprawl. Much less, we did NOT expect to find a wandering NCR Ranger patrol force. After reaching out and assuring the patrol that we were not going to kill them, we were able to convince the patrol force to join back into the fold. \n\nWhat’s more is that it turns out that their leader, an anthropomorphic fox named Ducky Foxxo, was in charge of them. Part of the Universal Expedition, led by Specialist Miles ‘Tails’ Prower, Foxxo was separated from the expedition when the party arrived initially in early 2275. Reunited with his friends on the other side, Foxxo was overjoyed to be back with friends. Although he seemed oddly flushed and overly interested with some creature over on the East Coast...whatever it is anyhow."
enc_furry.7.a: "What are they, a furry?"
enc_ducky_quack_quack_tt: "Another Anthro Fox? Let’s hope that’s the last one."

enc_furry.8.t: "Party in the USDA"
enc_furry.8.d: "The Expedition led by Specialist Prower is a colorful bunch, whether that be some of the best soldiers we’ve seen to an idiot in blue armor. Of course the three that had stood out were the ones that had, no joke, come from Hell itself. Though unlike what most people would believe, they weren’t creatures that would make you go insane. The lead one, and the tallest one at that, was Queen Beelzebub, the Sin of Gluttony herself. Apparently one of the last surviving members of the Sins from Hell, with the others being the king of lust and the bastard that caused the original, having been taken prisoner by the Purists. \n\nAfter some small war games, we know that she can fight, not to mention we’ve seen her turn into a giant after a Purist (the Purists here, not the massive successful world conquering ones) tried to hurt one of the Hellhounds she brought with her. But she also offered us something that once we started to expand would need in large amounts, food. Whilst our armed forces are led and improved by General Prower along with those already under our banner, an army can’t fight with an empty stomach. Queen Bee has thus offered that, alongside helping lead the armed forces due to experience of leading armies, having lead the legions of Hell to fend off the Purists, she would also help rebuild the USDA. Considering her abilities and what she is, it only makes sense that she could help rebuild the department. \n\nThough with leadership of the armed forces, Queen Bee and Amadeus are working together. Though Queen Bee leaves Amadeus to be the main man, since he was more experienced than her despite being far younger. One side effect is that we’ve seen a strange uptick in enlistment into our armed forces, our best guess is that the promise of food is a turn on for many, that or the reports of her throwing massive parties in one of the empty robot storage units were true.  We’re hoping it’s the former and not the latter."
enc_furry.8.a: "Best not to look into it."
enc_FOX_Hellaverse_tt: "Ignore the noise at night and you’ll be fine."

enc_furry.9.t: "Remember the UNSC"
enc_furry.9.d: "Whilst many of Specialist Prower’s Expedition pledged loyalty to us so they could eventually get back at the Purists, they still remember and carry on the legacy of the factions or nations they used to serve. For a good chunk of the humans with them, they belonged to the United Nations Space Command. A nation that spanned across their galaxy, one that was struggling with rebellions before engaging in a war against a multi-species empire named the Covenant. When the Purists arrived, the UNSC along with the ‘Swords of Sanghelios’, a splinter group of the Covenant, were dealing with a dangerous parasitic species named ‘The Flood,’ on earth, and in an eerily similar scenario to when the Purists arrived to Mobius, began aiding in the cleansing of the infected, portraying themselves as the good guys. Of course this was just a means to an end where, just like Mobius, the Enclave revealed their intentions and with the use of ancient weaponry and a sole robotic force, wiped the galaxy clean. If not for  Specialist Prower and friends saving them at the last moment, the UNSC would have been wiped out. Though luckily in those last moments, a hero named ‘Master Chief’, Spartan John-117 made sure that the Purists could never have used the ancient ‘Halo Rings,’ again. It is unclear if he is still alive or not but UNSC records indicate he is neither KIA nor MIA. \n\nNow they’re here, battered and low on morale, equipment falling into disrepair and some losing hope. A similar state to how we were when first arriving at the Sierra Army Depot. But with shared motivation and Specialist Prower, they’re ready to help us, and while we may not be able to produce any of their equipment or something for a while, we can still use their expertise and skill to help boost our own forces. Not to mention that some of their personnel can easily lead some fields that we’re lacking in and ease the burden of training an entire generation off of Sergeant Dornan, who had quickly made friends with one Sergeant Major Avery Johnson. Enclave Intelligence has also seen a boost with members of the UNSC’s version of the Office of Naval Intelligence, even if they're on the same level of secrecy as Colonel Callahan. \n\nThere’s also the matter of Sergeant Caboose and the Alpha, two ‘soldiers’ that are far off from being actual soldiers. With the Alpha being an A.I. that far exceeds the ZAX units of the Pre-War era but is incredibly rude and one of the worse shots ever seen, and the less said about Sergeant Caboose the better. Yet with all this, they still prove to be good leaders, even if the Alpha is an asshole."
enc_furry.9.a: "The Legacy of the UNSC continues on..."
enc_FOX_UNSC_tt: "Remnants of the UNSC will join the American cause...for now."

enc_furry.10.t: "The Eggman"
enc_furry.10.d: "‘WHAT DO YOU MEAN YOU DON’T KNOW WHERE WE ARE YOU DIMBOT!’ The man growled, holding the red orbed robot close to his snarling face, breath filled with the smell of onions and garlic, a favorite of his much as he loathes to admit it. \n\nHe was the Eggman, otherwise known as Doctor Ivo Robotink, the greatest scientist in the world! With a luscious mustache of ginger, a shiny dumb of brilliance, and clothes befitting a man of brilliance like him. It truly was a godsend that he, the greatest genius were born into his world. Or was, before those dastardly rats got help in the form of a group of otherworlders. Purists, they called themselves! Hardly, those dimwitted neanderthals did not deserve to call themselves such. Why. he had so much more purity than those apes! He was an Overlander, not some masquerading, curse spouting- \n\n‘Our sensors indicate that-’ THAT RED IDIOTIC- \n\n‘BE QUIET! What have I told you about interrupting me when I AM TRYING TO THINK! DO YOU WANT TO BE REPROGRAMED!?’ He yelled, throttling the infernal machine, snarling with blazing eyes of fury. \n\nThe little orb-like robot shook his head quickly while the yellow cubed idiot shook in his place, at least he knew a god when he saw one. He needed to think, he had suffered a similar fate to the one he now found himself in- \n\nSmirking, he tossed the useless piece of circuits behind him and got over to the Eggframe, his super computer as he began to write a log. Why it was brilliant, genius! He could use those neanderthal’s tactics himself, trick these so-called ‘Wastelanders’ to worship the very ground he walked on! Even better, that blue pest and his rats of so called ‘friends’ are likely dead and gone, it made him laugh and chortle. Yes. . .Eggman land would come to be once more! Ohohoho! It was so brilliant, perfect for a genius such as himself! Perfection in digital form like his handsome face, his great healthy body! OHOHOHO!"
enc_furry.10.a: "'Dear journal, I have a brilliant plan!'"
enc_FOX_eggman_dang_it_tt: "The Eggman Storyline ends here for now..."

enc_furry.11.t: "The Encroaching Darkness"
enc_furry.11.d: "Granite sat in one of the makeshift conference rooms that had been made in the Sierra Army Depot, all around him were the higher ranking members of Specialist Prower's Expedition, the reason was simple, the Purists. They had been talking about Anderson's followers ever since they arrived, and Granite had finally had the time to talk to them about what had caused them all to even be at the Depot. Apparently in another universe, Dornan had voted for Anderson and thus caused him to win the election. Soon the Purists began the reclamation and purification of North America, something he knew Anderson would try to do if he was to win the election, and to now know a variant of Anderson had won...it only emboldened him to crush the Purists in the depot. Eventually the continent had fallen under Enclave control, and years had passed before they had uncovered a vault containing a portal, one that had led to Mobius, the planet that would start the chain of dominos that was the Purists' endless conquests. From what Specialist Prower, General Prower and General Shadow explained, they originally portrayed themselves as allies, helping them fight off EggMan, but after the heroes had discovered their lies, the Purists and Mobius went to war, eventually ending with the remnants of the Kingdom of Acorn and the Resistance fleeing through portals while the Purists began establishing colonies on their world. \n\nAfter that, it triggered a domino effect where the Purists slowly took over more and more worlds, crushing and enslaving those that held non-human populations while those that were pure human worlds were given an ultimatum, join or be enslaved. Many agreed, not being able to stand against the Purists. But the Purists did meat opposition, with Specialist Prower and his group fighting against the Purists at every turn, making them bleed for their conquests, slowly building allies and giving hope that the Enclave can eventually be beaten. Their most recent encounter with The Purists was in the universe that held Alister, and after recouping, they arrived here. If anyone else Granite told him their journey, he would think they were insane, but having multiple anthro animals, humans and a literal demon tell him it? \n\nIt was the strange reality he now lived in, and as he stood up and breathed in before breathing out, he spoke."
enc_furry.11.a: "Let them come."
enc_FOX_purists_oh_come_on_tt: "This is where the Purist Final Boss Storyline ends for now..."

enc_furry.12.t: "No Enclave here!"
enc_furry.12.d: "Ever since we arrived at the depot, we’ve had to be careful not to catch the attention of the NCR, no matter how much we grow, the NCR would still be a threat with all the resources and manpower they have access to. While we have taken strides to make it so that we don’t appear to be the Enclave, we still have to deal with NCR Rangers and spies inside our borders, kicking them out with various made up reasons just so they would leave us alone. With the integration of Ghouls, Super mutants and The S’lanter, this has become somewhat easier, but then an accident came that we thought would be the end for us, only to be the perfect escape goat. An NCR Ranger was spotted sneaking into The USDA’s building in New Reno, but instead of finding anything important, he was wrapped into a party of gigantic scales thrown by Queen Bee, now we aren’t sure how we didn’t find out about this, but before we could apprehend the Ranger, they had escaped back to California. Enclave Intelligence quickly went to work while Callahan went to explain to Queen Bee that she can’t just throw parties whenever she feels like it. \n\nThat was until our spies in the NCR learned that the Ranger, after seeing every color in the rainbow and colors that shouldn’t exist along with Mobians, Demons, Humans, S’lanter, Ghouls, Super Mutants, Etc, reported that we weren’t the Enclave to Ranger Intelligence. Citing that the wide range of non-humans just did not fit The Enclave’s MO. This then gave us an idea, what if we began promoting our non-human personnel alongside our human ones? Propaganda that shows heroes like Specialist Prower or Queen Bee herself, an entire propaganda campaign to confuse The NCR and throw them off our trail. Of course, while it won’t completely take their attention off from us, it will redirect the NCR’s attention and give us more time to prepare for our eventual war with them. \n\nOf course this also helps improve the image of our non-human personnel in our territory. Many enlisting to either help or fight under these heroes. Of course this may create a cult of personality for some of them, but we don’t have to worry about that for a long, long time. On a side note, Queen Bee has been allowed to throw more parties, just as long as Enclave Intelligence gets more crates of Nuka-Cola."
enc_furry.12.a: "Guess being accepting has its perks..."
enc_FOX_huh_good_for_something_after_all_tt: "'Please keep the Yakuza away from both Specialist Prowers, they will begin worshipping them.'"

#Ideas

FOX_acorn_freedom_fighters_desc: "Remnants of the Kingdom of Acorn, these self-declared Freedom Fighters have sworn an oath to the stars and stripes, all to aid in dismantling the Purists and defeating them once and for all when they come for us."
FOX_mobian_resistance_desc: "The Resistance from what is known as Dimension Prime was the home dimension of Specialist Prower and his team of Mobians. Although their Sonic is dead, the Kingdom of Acorn has reported their Sonic to be MIA so there is a slim chance of a Sonic being out there should worse come to worse."
FOX_UNSC_remnants_desc: "The United Nations Space Command was the lead government in charge of Earth in what is known as Dimension 34301. Having fled their dimension with remnants of the Swords of Sanghelios, a splinter group of the infamous Convenant, the UNSC is much smaller than it once was. From a a inter-galactic government to a group of survivors who have seen it all. The remnants of humanity's government seeks vengeance against those that call themselves human."
FOX_UNSC_ONI_remnants_desc: "The UNSC's equivalent of the CIA, the Office of Naval Intelligence was the more shady aspect of the UNSC. Having been in charge of various programs and other aspects of the UNSC, ONI was the one responsible for the successful Spartan II and less successful Spartan III Programs."
FOX_UNSC_fledgeling_spartan_V_program_desc: "A fledgeling program led by Enclave scientists and the ONI remnants, along with officers of the UNSC, the goal is to create a better evolution of the Spartan IIs, this time without kidnapping children."
FOX_UNSC_spartan_V_program_desc: "An intermediate success, the Spartan IV program has seen a large success in creating a new generation of super soldiers whether they be adult or child."
FOX_hellaverse_remnants_desc: "Made up of remnants from LITERAL HELL, they have sworn an oath to the American cause to take down the Purists. What's more, the sole Sin who survived the Purists without capture, Queen Bee has managed to contact our world's Hell and meet up with its King or as she calls him 'Lucie Goosey', whatever that means. Regardless we have our Hell's support...somehwhat as the short king of Hell is currently embroiled in a Civil War with the four other sins of Hell."
FOX_world_war_two_remnants_desc: "Made up of the best and brightest Americans of the Second World War, the remnants have sworn an oath to the stars and stripes to take back their own country from tyranny."
FOX_he_is_the_eggman_desc: "The threat of Eggman looms over the West and so we must prepare."
FOX_purist_threat_desc: "The threat of the Purists looms over the West and so we must prepare."

#Furry Traits

eop_spartan_trainer: "Head Spartan Trainer"
eop_spartan_trainer_desc: "Head of the Spartan Training Program near the end of the Human-Covenant War and Created Rebellion Major Foxtrot had much experience in the realm of on the line combat. It was he who help win the Battle of Earth in 2552 and he who revolutionized the Spartan Training with the assistance of other Spartans. Although a decorated Major, Foxtrot has been out of practice for the last few years until now, meaning his skills are somewhat rusty and could lead to hesitation."

eop_super_earth_general_of_the_army: "Super Earth's General of the Armed Forces"
eop_super_earth_general_of_the_army_desc: "The highest ranking General of the Super Earth Military, General Brasch had a lengthy history of combat under his belt. From the First Galactic War of 2044 and the Second Galactic War of 2184, Brasch has fought in various battles and skirmishes, against cyborgs, bugs and squid-like aliens known as the 'Illuminate', whatever that is. Regardless, his skills speak from themselves given he was able to arrange costly battles against the Purists in virtually every dimension he has fought in."

eop_human_trigger_advisor: "Aircraft Expert and Ace"
eop_tails_desc: "Hailing from the planet, Mobius, Miles 'Tails' Prower is one of the most intelligent children of his generation. Aged only 8, Tails as he likes to be called, has almost thrice the intelligence of Einstein here on planet Earth. With expertise in robotics and aerial technologies, this vulpine is sadly also versed in the arts of war in part due to the Purists invading his home dimension and so many others. He has sworn loyalty to the United States cause, seeing it as the only means to defeat the Purists when they come for OUR Earth. Not that we'll let them take it over without a fight of course."

eop_mobian_nine_tails_advisor: "Armored Warfare Expert"
eop_mobian_nine_tails_research_advisor: "Intelligent Cyber Vulpine"
eop_nine_tails_desc: "Hailing from the planet, Mobius, Miles 'Nine Tails' Prower is one of the most intelligent children of his generation. Aged only 12, Nine as he likes to be called, has almost thrice the intelligence of Einstein here on planet Earth. With expertise in robotics and aerial technologies, this vulpine is sadly also versed in the arts of war in part due to the Purists invading his home dimension and so many others. He has sworn loyalty to the United States cause, seeing it as the only means, for the moment, to gain revenge on the Purists and Segregationists."

eop_sin_general_of_the_army: "Hell Royal Guard General"
eop_sin_general_of_the_army_desc: "Hailing from the Ring of Gluttony, Queen Bee-Beelzebub is the Sin of Gluttony and was the person in charge of Hell's Army before being removed and the Army dismantled by the Sin of Wrath in the time that the Sin of Pride had been away wallowing in self pity due to a divorce. Having had experience rebuilding an Army from scratch and from fighting the Purists, Queen Bee has pledged herself to the American cause if only to beat down the so called 'Purists' once and for all."
eop_sin_general_of_the_air_force: "Hell Royal Air Force Marshal"
eop_sin_general_of_the_air_force_desc: "Hailing from the Ring of Gluttony, Queen Bee-Beelzebub is the Sin of Gluttony and was the person in charge of Hell's Army before being removed and the Army dismantled by the Sin of Wrath in the time that the Sin of Pride had been away wallowing in self pity due to a divorce. Having had experience rebuilding an Army from scratch and from fighting the Purists, Queen Bee has pledged herself to the American cause if only to beat down the so called 'Purists' once and for all."
eop_sin_of_gluttony: "Sin of Gluttony"
eop_sin_of_gluttony_desc: "Hailing from the Ring of Gluttony, Queen Bee-Beelzebub is the Sin of Gluttony and was widely known as a major food source and alcohol manufacturer within Hell prior to the invasion of the purists. In a time where food is scarce and crops take longer to grow, Beelzebub has taken on the USDA herself until a proper head of the USDA can be found. Although many of the more neutral staff heavily contest that she as a mutant has no right to lead it, they cannot do much about it as of this moment. Just don't ask where her alcohol, Beelzejuice, comes from..."

eop_moxxie_mayweather: "Firearms Expert"
eop_moxxie_desc: "Hailing from the Pride Ring of Hell, Moxxie Mayweather was once the firearms expert of the Immediate Murder Professionals who were a group of imps and General Loona that would take up contracts of sinners to kill people in the mortal world whether it be people who wronged them or as a type of revenge. Of note though, IMP did not take up just any contract and picked what they did carefully, ONLY going after people who were malicious and not those who were purely innocent as can be attested to by Beelzebub, General Loona, and Specialist Moxxie himself. Although IMP itself is gone, Moxxie seeks to maintain the legacy of it and his missing wife. He knows she's not dead but captured by the Purists, giving him great incentive to fight for America to help save his wife and friends."

FOX_naval_chief_hood: "Chief of Naval Operations"
FOX_HALO_hood_desc: "Lord Terrence Benjamin Hood(service number 07960-48392-TH) is a Fleet Admiral and the highest ranking flag officer of the UNSC Navy: the Chief of Naval Operations. In this capacity, he served as the defacto leader of humanity's war effort during the later years of the Human-Covenant War in 2552. Fleet Admiral Hood has since continued to serve as the Chairman of the UNSC Security Council, the leading commission within the UNSC High Command, making him the leader of the UNSC remnants."

FOX_UNSC_general_of_the_army: "UNSC General of the Earth Armies"
eop_UNSC_general_of_the_army_desc: "Major General Nicolas Strauss was a two-star general of the UNSC Army and a member of the UNSC Security Council prior to jumping to our Earth, in charge of Earth's defense and the Solona System as a whole. Strauss was in charge of the entirity of Earth's defenses on the ground and the surrounding planets of Mars, the Moon, and numerous others. Now here, he will help bolster America's forces for what is to come using knowledge centuries ahead of our own."

FOX_UNSC_special_warfare_officer: "Chief of Special Warfare Operations"
FOX_holland_desc: "Colonel Urban Holland, also known as 'Noble Actual', was a human field grade officer of the UNSC Army who served during the Human-Covenant War. He was the commanding officer of Special Warfare Group Three and had operational control of NOBLE Team during the Fall of Reach. Now on our Earth, he has pledged to aid the Enclave in defeating the Purists and any other threat that may come our way."

FOX_arbiter_desc: "Arbiter Thel 'Vadam (formerly 'Vadamee) is the Sangheili kaidon of the House of 'Vadam and the last Arbiter to serve the Covenant. He continues to hold this title in the wake of its dissolution. Presently, he leads the Swords of Sanghelios, an alliance of keeps modeled after an ancient order of the same name, and is considered by many to be the formal leader of all Sangheili as the Kaidon of Unity. He is also considered as a 'True Prophet' among Convenant remnants leading to many to flock to him. That and quite a few humans which seem rather...obsessed with his particular species and himself."

FOX_fleet_master_desc: "Rtas 'Vadum (formerly 'Vadumee), nicknamed the Half-Jaw following the loss of two of his mandibles, is an influential Sangheili commander and a high-ranking official in the Swords of Sanghelios. Rtas has become a hero among Sangheili for his bravery and leadership during the Great Schism. He was responsible for negotiating the alliance between the Fleet of Retribution and the United Nations Space Command and now the alliance with the Enclave in conjunction with Fleet Admiral Hood and Field Marshal Amadeus."

eop_Echo_Five_Fox_One: "Ace Pilot Genius"

#The following below are Descriptions from Fandom Wikis, I take NO credit for this section of the Localization other than some cleanup here or there.

eop_Fox_McCloud_desc: "Fox James McCloud is referred to by the name of Star Fox, especially by his many enemies. He is an expert Arwing pilot, combatant, adventurer, and the leader of the Star Fox team. Fox is the only son of James McCloud, who educated him throughout his childhood to never give up, with a keen interest from James's best friend Peppy Hare. Thrust into the leadership role as leader of Star Fox, Fox recruited the hot-tempered Falco Lombardi and the mechanical genius Slippy Toad to make up the new Star Fox Team. For a price, this crack group fought against any threat to the Cornerian star system prior to the Purists arrival which ignited what was known as the First Cornerian Galactic Great War."