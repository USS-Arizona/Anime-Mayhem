l_english:

#nextline "\n"
#skipline "\n\n"
#FURRIES UWU

enc_am.1.t: "The Calamity" 
enc_am.1.d: "It was Thursday evening and things in the Depot were quiet...too quiet for Dornan if he was honest. He had a bad feeling something was about to happen. The more older population of their little Enclave at the Depot was far too well behaved, the younger too busy-bodied today. He just knew some bullshit from the Wasteland was about to happen. \n\nBy the Lord and Savior themselves, he was god damn right! Not even two hours past mid-morning and the Depot shook like crazy as a portal opened up in the middle of Storage Facility T-618, scaring the bajesus outta some poor Privates smoking a joint in their offtime. What walked through horrified most sides, confused a few, and intrigued a very minut some. \n\nOut from the Portal came humans, super humans, and robots. All marching behind a man in an old US Army uniform who looked at Sergeant Dornan and asked one thing to the baffled aging man, \n\n'Is Douglas Granite here yet?"
enc_am.1.a: "What. The. Literal. Fuck."
enc_am.1.b: "'Oh hey what does this trigger do...opps.'"
enc_am_furries_tt: "I mean...they could be useful."
enc_am_no_furries_tt: "WHO TURNED OFF THE SAFETY?"

#American Heroes

enc_am.2.t: "American Heroes!"
enc_am.2.d: "Also among these mass amounts of human and animal people, were even American Heroes from days past! Albeit from multiple universes. \n\nAmong them being Henry Arnold, General Pershing, George Washington, and even American Singers such as Kenny Loggins and Martin O'Donnell! It seems that according to the robots and our past heroes, their worlds were taken over by the Purists leading to them fleeing from their respective universes. Each flocking to ours to assist in Douglas Granite winning the election."
enc_am.2.a: "What. Did. They. Do."
enc_am_american_heroes_tt: "They did what to the Enterprise?!"

#American Grit

enc_am.3.t: "Rugged Men"
enc_am.3.d: "General Pershing was not one to shy away from the bloody side of war, nor was he one to simply back away when the going got tough. \n\nHim and Arnold had been through hell and as he stood over Sergeant Dornan training the recruits with Sherman watching on with curiosity at the training regiment, he frowned. \n\nHis America had changed from how it was. Granted, it was divided in his time even before the Purists showed up. But this...this was awful. \n\nRadiation, whatever that was, scorched the landscape and he knew without a doubt... \n\nHe would not stop until it was restored."
enc_am.3.a: "This United States will be restored."
enc_am_american_grit_tt: "Lord willing."

#An Argument of American Heroes

enc_am.4.t: "Argument of Heroes"
enc_am.4.d: "Arnold and Pershing often butted heads back in the Golden Days before the Purists. Even now, old Ike did. But this? This was too far. \n\n'My tactics worked, Arnold. We kicked the Germans out from Europe and ensured victories for days to come!' \n\nArnold, for his part, glared at Pershing. What his tactics did, could be seen merely out a window. \n\n'Your tactics led to a nuclear holocaust worse than the Jerries or even the Nazis! Listen here, John. I once spoke highly of you, even admired you a bit but ever since we've been stuck together with Washington, you have been nothing but a pain in the ass! I know you don't like me, heck I don't even like you given the circumstances YOU created in this universe so shut up, we're the last of our United States now. Do you really, REALLY want to repeat a Great Apocolypse just for a victory?!'"
enc_am.4.a: "Pershing was silent..."
enc_am_american_heroes_argument_tt: "...but deep down, he knew, Hap was right."

#Remembering Sonic

enc_am.5.t: "Remembering Yamato"
enc_am.5.d: "Kodai sat on top of the Sierra Army Depot Admin Building and held a picture of him and the Yamato crew together. It had been taken prior to the Purist's arrival. \n\nTears trickled down the captian's cheek, he missed his friends so much, more than words could tell. \n\nThey had been there for him since their adventure to Iscandar...and now...\n\nNow he was alone."
enc_am.5.a: "Rest well, Yamato."
enc_remembering_yamato_tt: "You won't be forgotten."

#American Singers

enc_am.6.t: "America's Warrior Spirits"
enc_am.6.d: "In order to boost morale among the troops and civilian populace, the singers from the past have been asked to sing to cheer our servicemember's on through this tremedous time and era. \n\nKenny Loggins, Martin O'Donnell, and other prominant radio legends return to radio to boost our morale on AFN. Each with songs from long ago during the Cold War and even new songs of their own making."
enc_am.6.a: "Never thought, I would see this."
enc_am_american_singers_tt: "Or hear it for that matter."

enc_am.7.t: "Washington's Remnant"
enc_am.7.d: "When arriving up in the North West Commonwealth, we did not expect to find rouge robots not from this world when exploring the ruined area of White Sprawl. Much less, we did NOT expect to find a wandering Resistance patrol force. After reaching out and assuring the patrol that we were not going to kill them, we were able to convince the patrol force to join back into the fold. \n\nWhat’s more is that it turns out that their leader, a skilled commander named Bradford, was in charge of them. Part of the Universal Expedition, led by Gen. Arnold, Central was separated from the expedition when the party arrived initially in early 2275. Reunited with some of his friends on the other side, Central was happy to be back with comrads."
enc_am.7.a: "Well what's next Giant Mechs?"
enc_central_tt: "Please make this a normal inter-universal war. With Central no way! Awwh."

enc_am.8.t: "Party in the UAF"
enc_am.8.d: "The Expedition led by Gen. Arnold is a colorful bunch, whether that be some of the best soldiers we’ve seen to a literal green ball. Of course the three that had stood out were the ones that had, no joke, come from a more watered down version of Earth. Though unlike what most people would believe, they weren’t creatures that would have fish tails or something similar. The chosen leader, and the tallest one at that, was USS New Jersey, the Black Dragon herself. Apparently one of the last known surviving members of the Iowa sisters, having lost the others during the many mutildimensional escapes from the Purists. \n\nAfter some small war games, we know that she can fight, not to mention we’ve seen her turn into a dragon after a Purist (the Purists here, not the massive successful world conquering ones) tried to hurt small Jersey who she could not leave behind. But she also offered us something that once we started to expand would need in large amounts, Sea Security. Whilst our armed forces are led and improved by General Arnold along with those already under our banner, an army can’t fight overseas without a protected logistics systems. New Jersey has thus offered that, alongside helping lead the armed forces due to experience of leading armies, having lead the Eagle Union Fleets to fend off the Purists, she would also help rebuild the USN. Considering her abilities and what she is, it only makes sense that she could help rebuild the department. \n\nThough with leadership of the armed forces, New Jersey and Arnold are working together. Though Jersey leaves Arnold to be the main man, since he was more experienced in ground warfare than her. One side effect is that we’ve seen a strange uptick in enlistment into our armed forces, our best guess is that the promise of protected coasts is a turn on for many, that or the reports of her throwing decent sized gaming sessions in one of the empty robot storage units were true.  We’re hoping it’s the former and not the latter."
enc_am.8.a: "Best not to look into it."
enc_ARI_USF_tt: "Ignore the noise at night and you’ll be fine."

enc_am.9.t: "Remember the EFSF"
enc_am.9.d: "Whilst many of General Arnold's Expedition pledged loyalty to us so they could eventually get back at the Purists, they still remember and carry on the legacy of the factions or nations they used to serve. For a good chunk of the humans with them, they belonged to the Earth Federation Space Forces. A nation that spanned across their solar system, one that was struggling with rebellions against multiple space colonies that named themselves Zeon. When the Purists arrived, the EFSF were currently engaged in both land and space warfare with Zeon and were slowly winning, but in an eerily similar scenario to when the Purists arrived to the Azur Lane Universe, they assisted the EFSF in putting down this rebellion to become saints in the many rose tinted glasses in the population of the Earth Federation. Of course this was just a means to an end where, just like Azur Lane, the Enclave revealed their intentions and with the use of ancient weaponry and a sole robotic force, wiped the EFSF command center clean of the earth. If not for General Arnold and friends saving them at the last moment, the female side of the EFSF would have been used as breeding stock for the Purists, and the male side being drafted into the Purist's 'human' divisions. Though luckily in those last moments, two heros named Amuro Ray and Char Aznable made sure that the Purists could never have taken the plans for the RX-78 and other 'Gumdam' mobile suit platforms. \n\nNow they’re here, battered and low on morale, equipment falling into disrepair and some losing hope. A similar state to how we were when first arriving at the Sierra Army Depot. But with shared motivation and many advanced tech data-bases, they’re ready to help us, and while we may not be able to produce any of their equipment or something for a while, we can still use their expertise and skill to help boost our own forces. Not to mention that some of their personnel can easily lead some fields that we’re lacking in and ease the burden of training an entire generation off of Sergeant Dornan, who had quickly made friends with one sentient gundam, SD-04. They are deffinity a sight for sore eyes due to the lack of recruit training and experienced officers that share similar ideals"
enc_am.9.a: "The Legacy of the EFSF continues on..."
enc_ARI_EFSF_tt: "Remnants of the EFSF will join the American cause...for now."

enc_am.10.t: "The Sirens"
enc_am.10.d: "‘WHAT DO YOU MEAN YOU DON’T KNOW WHERE WE ARE YOU DUMBASS!’ The female growled, holding a girl in school clothes with a manta ray like surfboard close to her snarling face. \n\nShe was Observer Zero, the most powerful Siren in the world! With a fluffy winter coat, and being the only one of here kind in this universe. It truly was a pain that she, was brought into this world. She liked it better on the previous world, but she had to keep track of Purifier and join her to this world. She knew of the Purists or whatever they called themselves. Those humans were always troublesome. Why did she have to deal with purity fanactics, she rather deal with Puri than those humans! She was a Siren, not some masquerading, curse spouting- \n\n‘Can we go explore and kill-’ - \n\n‘Purifier! What have I told you attacking new worlds! DO YOU WANT TO BE CUT OFF FROM THE REPLECATORS AND BE REPROGRAMED!?’ She yelled, throttling the annoying Siren, snarling with blazing eyes of fury. \n\nThe manta-ray carrying siren shook her head quickly while an octupus wielding siren shook in her place, at least she knew the Siren Hierarchy. She needed to think, she had suffered a similar fate to the one she now found herself in- \n\nSmirking, she walked away from both sirens and got over to the Sirenframe, the Siren's super computer as she began to write a log. Why it was logical. She could use those human's tactics herself, to her advantage. Even better, she could use this new data and tactics and adapt all Sirens against Missile Combat. The Siren will be perfection against all KAN-SEN forms!"
enc_am.10.a: "'Dear journal, I have a brilliant plan!'"
enc_ARI_sirens_dang_it_tt: "The Siren Storyline ends here for now... til Fox does this stuff"

enc_am.11.t: "The Encroaching Darkness"
enc_am.11.d: "Granite sat in one of the makeshift conference rooms that had been made in the Sierra Army Depot, all around him were the higher ranking members of Specialist Prower's Expedition, the reason was simple, the Purists. They had been talking about Anderson's followers ever since they arrived, and Granite had finally had the time to talk to them about what had caused them all to even be at the Depot. Apparently in another universe, Dornan had voted for Anderson and thus caused him to win the election. Soon the Purists began the reclamation and purification of North America, something he knew Anderson would try to do if he was to win the election, and to now know a variant of Anderson had won...it only emboldened him to crush the Purists in the depot. Eventually the continent had fallen under Enclave control, and years had passed before they had uncovered a vault containing a portal, one that had led to Mobius, the planet that would start the chain of dominos that was the Purists' endless conquests. From what Specialist Prower, General Prower and General Shadow explained, they originally portrayed themselves as allies, helping them fight off EggMan, but after the heroes had discovered their lies, the Purists and Mobius went to war, eventually ending with the remnants of the Kingdom of Acorn and the Resistance fleeing through portals while the Purists began establishing colonies on their world. \n\nAfter that, it triggered a domino effect where the Purists slowly took over more and more worlds, crushing and enslaving those that held non-human populations while those that were pure human worlds were given an ultimatum, join or be enslaved. Many agreed, not being able to stand against the Purists. But the Purists did meat opposition, with Specialist Prower and his group fighting against the Purists at every turn, making them bleed for their conquests, slowly building allies and giving hope that the Enclave can eventually be beaten. Their most recent encounter with The Purists was in the universe that held Alister, and after recouping, they arrived here. If anyone else Granite told him their journey, he would think they were insane, but having multiple anthro animals, humans and a literal demon tell him it? \n\nIt was the strange reality he now lived in, and as he stood up and breathed in before breathing out, he spoke."
enc_am.11.a: "Let them come."
enc_ARI_purists_oh_come_on_tt: "This is where the Purist Final Boss Storyline ends for now..."

enc_am.12.t: "No Enclave here!"
enc_am.12.d: "Ever since we arrived at the depot, we’ve had to be careful not to catch the attention of the NCR, no matter how much we grow, the NCR would still be a threat with all the resources and manpower they have access to, unless we control Oregon, Utah, Nevada, and Wyoming. While we have taken strides to make it so that we don’t appear to be the Enclave, we still have to deal with NCR Rangers and spies inside our borders, kicking them out with various made up reasons just so they would leave us alone. With the integration of Ghouls, Super mutants and The S’lanter, this has become somewhat easier, but then an accident came that we thought would be the end for us, only to be the perfect escape goat. An NCR Ranger was spotted sneaking into The United Azur Fleet's building in New Reno, but instead of finding anything important, he was wrapped into a tea party of gigantic scales thrown by Queen Elizibeth II, now we aren’t sure how we didn’t find out about this, but before we could apprehend the Ranger, they had escaped back to California. Enclave Intelligence quickly went to work while Callahan went to explain to Queen Elizibeth II that she can’t just throw tea parties whenever she feels like it. \n\nThat was until our spies in the NCR learned that the Ranger, after seeing every color in the rainbow and colors that shouldn’t exist along with Shipgirls, Humans, S’lanter, Ghouls, Super Mutants, Etc, reported that we weren’t the Enclave to Ranger Intelligence. Citing that the wide range of non-humans just did not fit The Enclave’s MO. This then gave us an idea, what if we began promoting our non-human personnel alongside our human ones? Propaganda that shows heroes like USS New Jersey or Queen Elizibeth II herself, an entire propaganda campaign to confuse The NCR and throw them off our trail. Of course, while it won’t completely take their attention off from us, it will redirect the NCR’s attention and give us more time to prepare for our eventual war with them. \n\nOf course this also helps improve the image of our non-human personnel in our territory. Many enlisting to either help or fight under these heroes. Of course this may create a cult of personality for some of them, but we don’t have to worry about that for a long, long time. On a side note, Queen Elizibeth has been allowed to throw more tea parties, just as long as Enclave Intelligence gets more crates of Nuka-Cola and maybe some new tech."
enc_am.12.a: "Guess being accepting has its perks..."
enc_ARI_huh_good_for_something_after_all_tt: "'Please keep the Yakuza away from both of First Fleet Carriers, they will begin worshipping them.'"

#Type Orginal Stuff

enc_am.13.t: "A Steel Tea Party"
enc_am.13.d: "After following General Arnold’s expedition to the multiverse, we shipgirls have been unfamiliar with land combat, even losing some of our own during the travels to our sorrow. However after we finally made it to the right universe where the purists can't reach us we have settled down in the bustling shanty town of Harlong and the SAD we have decided to gather all the leaders from both the “Azur Lane” universe and the “Kantai Collection” universe, to have a tea party and discuss what we can do to help the rebuilding United States."
enc_am.13.a: "How do they have tea readily available?!"
enc_ARI_steel_tea_tt: "I wonder how their ships work?"

enc_am.14.t: "The Great Discussion"
enc_am.14.d: "KC Hornet: So what are we going to do here, we have no place to dock, most of our ammo is gone, and we don’t have our shikkan to guide us.\n\n AL Yorktown: This President Granite seems interested in helping us repair in exchange for our services to the United States though he is a very busy person dealing with organizing the depot. I think helping him would benefit us tremendously.\n\n AL Bismark: That is all well and good Yorktown but what would call this group because it is not just Azur Lane here but those from the other universe?\n\n KC Yamato: I would say that we should call ourselves the “Shipgirl Confederation” what are you thoughts sister?\n\n KC Mushashi: How about the “United Azure Fleet”? I think that would fit the best due to its symbolism.\n\n AL QE: It is decided then the “United Azure Fleet” shall assist the United States on its mission to rebuild.\n\n Everyone: Very well then, let us get to work as best we can."
enc_am.14.a: "This will be interesting to watch."



#Ideas

ARI_united_azur_fleets_desc: "Remnants of both Azur Lane and the Ship girls Fleets from the Abyssal Universe, have sworn an oath to the stars and stripes, all to aid in dismantling the Purists and defeating them once and for all when they come for us."
ARI_pony_resistance_desc: "The Equestrian Resistance from what is known as Equues was the home dimension of Princess Luna and her pony subjects. Although her sister was lost during a dimensional jump, the Kingdom of Equestria has reported that Celestia is MIA so there is a chance of the sister princess being reunited once more."
ARI_EFSF_remnants_desc: "The Earth Federation Space Forces was the space combat branch of the Earth Federation who was in charge of Earth in what is known as Dimension UC1979. Having fled their dimension with remnants of the Zeon Forces, a space born splinter group of the Earth Federation, both sides where much smaller than they once were. From a steller government to a group of survivors who have seen it all. The remnants of humanity's government seeks vengeance against those that call themselves human."
ARI_OSS_remnants_desc: "The predecessor of the CIA, the Office of Strategic Services was one of the many spy agencies that help win WWII. Having been in charge of various operations during the Second World War, OSS was the one responsible for the successful Operation PaperClip and the less successful Operation Iron Eagle."
ARI_fledgeling_Type_II_rigging_program_desc: "A fledgeling program led by Enclave scientists and The United Azur Fleet, the goal is to create a better evolution of the previous shipgirl rigging system, this time without the limited firepower of the Type I rigging."
ARI_wisdom_cube_program_desc: "An intermediate success, the Wisdom Cube program has seen a large success in creating a new generation of shipgirls using World War I and II era ship designs from the many different universes in the expedition. Perhaps we could improve it to have it use Missle Ship Designs in the future."
ARI_helgian_remnants_desc: "Made up of remnants from Helghan, they have sworn an oath to the American cause to take down the Purists. What's more, the leader who survived the Purists without capture or execution, Colonel, now General, Radec has managed to contact the expedition and join them, to eventually get rid of the Purist and the United Colonial Nations control of the Capital of the Helghian Empire."
ARI_cold_war_remnants_desc: "Made up of the best and brightest Americans that stayed in service after the Second World War, the remnants have sworn an oath to the stars and stripes to take back their own country from tyranny."
ARI_strangereal_remnants_desc:"The remnants of many different nations across their version of Earth, they have brought along some saved data on AI and Futuristic Aircraft blueprints. They are willing to help us be prepared for the coming Purist threat."
ARI_siren_threat_desc: "The threat of the Sirens looms over the West and so we must prepare."
ARI_purist_threat_desc: "The threat of the Purists looms over the West and so we must prepare."

#Weeb Traits

eop_spartan_trainer: "Head Spartan Trainer"
eop_spartan_trainer_desc: "Head of the Spartan Training Program near the end of the Human-Covenant War and Created Rebellion Major Foxtrot had much experience in the realm of on the line combat. It was he who help win the Battle of Earth in 2552 and he who revolutionized the Spartan Training with the assistance of other Spartans. Although a decorated Major, Foxtrot has been out of practice for the last few years until now, meaning his skills are somewhat rusty and could lead to hesitation."

eop_super_earth_general_of_the_army: "Super Earth's General of the Armed Forces"
eop_super_earth_general_of_the_army_desc: "The highest ranking General of the Super Earth Military, General Brasch had a lengthy history of combat under his belt. From the First Galactic War of 2044 and the Second Galactic War of 2184, Brasch has fought in various battles and skirmishes, against cyborgs, bugs and squid-like aliens known as the 'Illuminate', whatever that is. Regardless, his skills speak from themselves given he was able to arrange costly battles against the Purists in virtually every dimension he has fought in."

eop_human_trigger_advisor: "Aircraft Expert and Ace"
eop_trigger_desc: "Hailing from an alternate Earth, Three 'Trigger' Strikes is one of the most best fighter aces of his generation. Aged only 25, Trigger as he likes to be called, has almost thrice the skill of the best fighter aces here on planet Earth. With expertise in aerial technologies, this Osean is extremely versed in the arts of war due to prior wars and the Purists invading his home dimension and so many others. He has sworn loyalty to the United States cause, seeing it as the only means to defeat the Purists when they come for OUR Earth. Not that we'll let them take it over without a fight of course."

eop_v1_advisor: "Hard to Kill War Machine"
eop_v1_research_advisor: "Intelligent Super War Machine"
eop_v1_desc: "Hailing from warbound Earth, V1 was built for war but made obsolete due to the New Peace. Aged only 'unknown', V1 as he prefers to be called, compared to the other people he had to deal from where he comes from. With expertise in robotics and war, he is extremely versed in the arts of war in part due to the fighting demons, angels, and the Purists invading his home dimension and so many others. He has sworn loyalty to the United States cause, seeing it as the only means, for the moment, to gain revenge on the Purists and Segregationists."

eop_commadant_of_the_marinecorp: "Marine Corps Commadant"
eop_commadant_of_the_marinecorp_desc: "Hailing from Pullman, Washington; General James Mattis was the person in charge of America's Armies during the Iraq War before retiring and presuing a path in politics and civilian contracting, while the rest of the States carried on. Having had experience leading an Army and stepping up during the rebelion against the Purists, General Mattis has pledged himself to our American cause to beat down the so called 'Purists' once and for all, and was promoted Commadant of the reestablished Marine Corps."

eop_general_of_the_air_force: "Commander of the United States Air Force"
eop_general_of_the_air_force_desc: "Hailing from Gladwyne, Pennsylvania; Henry 'Hap' Arnold was a 5 star General of the USAF and was the person in charge of the US' Air Force before his US' contact with Purist's and him stepping down due to learning the true ethics and their true plan of the Purists with their planet and not wanting his knowledge and skill being used the wrong way. Having had experience rebuilding and improving an Air Force from scratch and knowing how the Purists operate, General Arnold has rejoined the American cause if only to beat down the so called 'Purists' once and for all."

eop_nuclear_father: "Father of the Nuclear Navy"
eop_nuclear_father_desc: "Hailing from Maków Mazowiecki, Poland, Admiral Ricktover is the Father of the United States' Nuclear Navy and was widely known as a major bureucratic nightmare for Naval Personel and a vocalist for nuclear propulision, however contact with the purist's slowed the program down due to the advanced tech of the Purists. However after joining up with Gen. Arnold's expedition the ability to put nuclear powered vessals was vastly expanded, due to them having a use of disrupting Purist shipping routes. Although he may be more aprehenive to our government compared to his peers, he will still apply his knowledge of nuclear navy propulsion and submarine tactics. Just don't ask where he has his nuclear powered submarines positioned..."

eop_wopr: "Planning Expert"
eop_wopr_desc: "Hailing from the depths of the Cheyenne Mountain Complex from Universe WG1983, War Operation Plan Responce was once the planning computer of the United States Strategic Air Command who were the main line of defense against missile threats to the US. Of note though, WOPR did cause a nuclear scare for US High Command due to challenging a kid to a game of thermonuclear war resulting in the base's lockdown. Although WOPR's orginal Cheyenne Mountain Complex is gone, WOPR seeks to maintain the legacy of its knowledge and strategic capability."

ARI_naval_chief_hood: "Head of Royal Navy Operations"
ARI_hood_desc: "HMS Hood is the second in command and the second ranking Royal Navy shipgirl in the Royal Navy, giving her the role of Head of Royal Navy Operations. In this capacity, she served as the leader of the Royal Navy's war effort during the later years of the Human-Siren War in 1948. HMS Hood has since continued to serve as the Vice Commander of the Azur Lane Security Council, the leading commission within the Azur Lane Command, making her the leader of the Shipgirl remenants."

ARI_general_of_the_army: "General of the Army"
eop_general_of_the_army_desc: "Hailing from Uniontown, Pennsylvania; George C. Mar was a 4 star General of the US Army and was the person in charge of the US' Army before his US' contact with Purist's and him stepping due to getting tired of the Purists and not wanting all his hard work being undone and used the wrong way. Having had experience improving a Army and knowing how the Purists operate, General Marshall has rejoined the American cause if only to beat down the so called 'Purists' once and for all."

ARI_tankery_commander: "Commander of the Early US Tank Corps"
ARI_pershing_desc: "John Joseph Pershing, nicknamed 'Black Jack', was an American army general, educator, and founder of the Pershing Rifles. He served as the commander of the American Expeditionary Forces (AEF) during World War I from 1917 to 1920. In addition to leading the AEF to victory in World War I, Pershing served as a mentor to many in the generation of generals who led the United States Army during World War II, including George C. Marshall, Dwight D. Eisenhower, Omar Bradley, Lesley J. McNair, George S. Patton, and Douglas MacArthur. /n/n During his command in World War I, Pershing resisted British and French demands that American forces be integrated with their armies, essentially as replacement units, and insisted that the AEF would operate as a single unit under his command, although some American units fought under British and Australian command, notably in the Battle of Hamel and the breaching of the Hindenburg Line at St Quentin Canal, precipitating the final German collapse. Pershing also allowed (at that time segregated) American all-black units to be integrated with the French Army."

ARI_big_boss_desc: "Big Boss, real name John, also known as Jack, and formerly known as Naked Snake, Vic Boss, Ishmael, Saladin, or simply Snake, was a renowned special forces operative and mercenary commander. He founded U.S. Army Special Forces Unit FOXHOUND, along with the mercenary company Militaires Sans Frontières, and was one of the founding members of the Patriots. Big Boss later established the military states of Outer Heaven and Zanzibar Land as bases for his companies, in order to realize his ambitions of creating a nation for soldiers. Considered by some as 'The Greatest Warrior of the 20th Century,' he earned such monikers as 'the Legendary Soldier' and 'the Legendary Mercenary,' feared in combat by both friend and foe as a hero and a madman. During the Cold War, Big Boss was an apprentice to The Boss, the so-called 'Mother of Special Forces,' and later served as a black ops field agent for the CIA's FOX Unit, under Major Zero. Having his genetic code used as part of the government project Les Enfants Terribles, Big Boss was the genetic father of Solid Snake (his subordinate and later nemesis), Liquid Snake and Solidus Snake. He was also the mental and physical template for his body double and former subordinate, Venom Snake, with whom he shared the title of 'Big Boss'."

ARI_yamato_captain_desc: "Susumu Kodai (古代 進, Kodai Susumu) is an Earthling officer of Earth Federation Cosmo Navy and the former third captain of the space battleship Yamato, he also previously served as head of Yamato's Tactics Department and as the ship's interim commander during the Battle Against Gatlantis in Orbit of Planet Shambleau and the Gatlantis Campaign. In addition to his important role in many of the ship's military victories, Kodai contributed to Garmillans and Earthlings finding a way out of the Great Garmillas War. After returning to Earth, he engaged with Yamato's Operations Officer Yuki Mori. /n/n In December 2202, he was called from the goddess Teresa of Terezart together with the rest of Yamato's crew. Alongside his comrades, he rebelled against the Earth Federation and began a journey towards Terezart to liberate it from the occupation of the Gatlantis Empire. /n/n In October 2205, he led the 65th Escort Corps during the fleet's diplomatic trip towards the Salezar System and subsequently during the Iscandar Incident. Following his dismission from the 65th Escort Corps in the aftermath of the incident, he became an inspector for the Saturn Restoration Project and was stationed aboard Ginga. /n/n With the activation of Operation DAD in October 2207, Kodai returned to Earth, met up with his former comrades, and with Mori, to reach for the Yamato. However, after failing to rescue Mori and causing her to be stranded on Earth as it became occupied by Dezariam, Kodai's lost his mental fortitude and was dismissed from his post as captain of the Yamato by Admiral Osamu Yamanami."

eop_bubbles: "Space Amoeba Mother"
eop_bubbles_desc: "Bubbles is a Space Amoeba Mother, she is an expert combatant, decent scientist, and leader of a fleet consisting of her children and surviving star ships of her and other universes. Bubbles was found by a scientist when surveying a gas giant, who took her in and then educated her the years before their retirement in their universe's 2350, she was taught basic science, space combat; with these skills she gained experience and popularity throughout her nations people. However when the Purists arrived they were tasked with learning the Amoeba's secrets and attempted to hunt her down, however she was able to escape with her 'mother' to this universe before the purists glassed her adoptive's nation's capital planet."